name: FlowScanner Scan

# Two scans per trading day, both pinned to EASTERN time:
#   premarket 09:00 ET -- the plan, 30 minutes before the bell
#   pulse     14:00 ET -- did it hold? FMP's daily bar updates intraday, so this
#                         re-reads EMAs/RSI/structure against today's live bar,
#                         past the lunch chop, with time left to act before close.
#
# PRIMARY trigger is an external Cloudflare Worker cron (see cloudflare/) that
# hits workflow_dispatch at the right Eastern time and passes session_type
# explicitly. GitHub's own `schedule` events can be delayed by hours during peak
# load, which silently skipped scans; the external cron fires on time and its
# dispatch starts almost immediately.
#
# The `schedule` crons below are kept only as a BACKUP for when the external cron
# misses. GitHub cron is UTC and does NOT follow DST, so each session is scheduled
# at BOTH its EDT (UTC-4) and EST (UTC-5) offset; the guard step maps the fired
# cron line (delay-immune) to a session, gated by the current Eastern offset.
on:
  schedule:
    - cron: '0 13 * * 1-5'  # 09:00 ET while EDT
    - cron: '0 14 * * 1-5'  # 09:00 ET while EST
    - cron: '0 18 * * 1-5'  # 14:00 ET while EDT
    - cron: '0 19 * * 1-5'  # 14:00 ET while EST
  workflow_dispatch:
    inputs:
      session_type:
        description: 'Session type override'
        required: false
        default: 'manual'

# Lets the built-in GITHUB_TOKEN push the history/latest.html commit back to main.
permissions:
  contents: write

concurrency:
  group: flowscanner-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      # First step, before any checkout or install: a firing at the wrong Eastern
      # hour (the DST twin of the real one) exits here having cost nothing.
      - name: Determine session type
        id: session
        env:
          DISPATCH_SESSION: ${{ github.event.inputs.session_type }}
        run: |
          if [ -n "$DISPATCH_SESSION" ]; then
            # Primary path: the Cloudflare Worker cron (see cloudflare/) fires ON
            # TIME and dispatches with the session already resolved. We trust it
            # verbatim — no wall-clock guessing.
            session="$DISPATCH_SESSION"
          else
            # Fallback path: GitHub's native `schedule` trigger fired instead
            # (safety net for when the external cron misses). GitHub can delay a
            # scheduled run by hours, so we must NOT key off the wall clock at
            # execution time — a premarket cron delayed to 10:43 ET must still be
            # treated as premarket. Map the cron line that actually fired to a
            # session, gated by the current Eastern UTC offset so exactly one of
            # each DST twin runs.
            offset=$(TZ=America/New_York date +%z)   # -0400 EDT, -0500 EST
            case "${{ github.event.schedule }}" in
              '0 13 * * 1-5') [ "$offset" = "-0400" ] && session=premarket || session=skip ;;
              '0 14 * * 1-5') [ "$offset" = "-0500" ] && session=premarket || session=skip ;;
              '0 18 * * 1-5') [ "$offset" = "-0400" ] && session=pulse     || session=skip ;;
              '0 19 * * 1-5') [ "$offset" = "-0500" ] && session=pulse     || session=skip ;;
              *)              session=skip ;;
            esac
            echo "Schedule '${{ github.event.schedule }}' offset $offset -> session '$session'"
          fi
          echo "session_type=$session" >> "$GITHUB_OUTPUT"
          echo "Session type: $session"

      - name: Checkout repo (full history)
        if: steps.session.outputs.session_type != 'skip'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        if: steps.session.outputs.session_type != 'skip'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        if: steps.session.outputs.session_type != 'skip'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # The runner has no persistent disk. output/history/ lives in the repo, so
      # pull it before the scan — main.py reads it from local disk unchanged.
      - name: Pull latest history from the repo
        if: steps.session.outputs.session_type != 'skip'
        run: git pull --rebase --autostash origin ${{ github.ref_name }}

      - name: Run scan
        if: steps.session.outputs.session_type != 'skip'
        env:
          SESSION_TYPE: ${{ steps.session.outputs.session_type }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          UW_API_KEY: ${{ secrets.UW_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Automatically provided by Actions — never configured as a manual secret.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Non-sensitive: repository variables, not secrets.
          REPO_OWNER: ${{ vars.REPO_OWNER }}
          REPO_NAME: ${{ vars.REPO_NAME }}
          PAGES_URL: ${{ vars.PAGES_URL }}
        run: python main.py --run now

      - name: Commit and push scan output
        if: steps.session.outputs.session_type != 'skip'
        env:
          SESSION_TYPE: ${{ steps.session.outputs.session_type }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/history output/latest.html
          if git diff --cached --quiet; then
            echo "No scan output to commit (non-trading day or no changes)."
            exit 0
          fi
          git commit -m "Automated scan: $SESSION_TYPE $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
